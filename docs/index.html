<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Take</title>
<script src="html5-qrcode.min.js"></script>
<script src="ean-lookup.js"></script>
<script src="tech-lookup.js"></script>
<script src="van-lookup.js"></script>
<style>
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-100Thin.otf") format("opentype");font-weight:100;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-100ThinItalic.otf") format("opentype");font-weight:100;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-200XLight.otf") format("opentype");font-weight:200;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-200XLightItalic.otf") format("opentype");font-weight:200;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-300Light.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-300LightItalic.otf") format("opentype");font-weight:300;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-400Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-400Italic.otf") format("opentype");font-weight:400;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-500Medium.otf") format("opentype");font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-500MediumItalic.otf") format("opentype");font-weight:500;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-600SemiBold.otf") format("opentype");font-weight:600;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-600SemiBoldItali.otf") format("opentype");font-weight:600;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-700Bold.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-700BoldItalic.otf") format("opentype");font-weight:700;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-800Black.otf") format("opentype");font-weight:800;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-800BlackItalic.otf") format("opentype");font-weight:800;font-style:italic;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-900XBlack.otf") format("opentype");font-weight:900;font-style:normal;font-display:swap}
  @font-face{font-family:"Sinkin Sans";src:url("Fonts/SinkinSans-900XBlackItalic.otf") format("opentype");font-weight:900;font-style:italic;font-display:swap}

  :root{
    --bg:#0d1420;
    --panel:#141d2b;
    --panel-2:#1a2436;
    --field:#1c2738;
    --field-border:#2a3a52;
    --text:#f2f5f9;
    --text-soft:#8b9ab0;
    --accent:#1f78d1;
    --accent-2:#f7a600;
    --ok:#34d399;
    --danger:#ff6b6b;
    --font-sans:"Sinkin Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font-sans);
    background:var(--bg);color:var(--text);min-height:100vh;
  }

  /* ---- slider: page1 (technician info) <-> page2 (edit details) ---- */
  .sliderViewport{width:100%;overflow:hidden;position:relative}
  .sliderTrack{
    display:flex;width:200%;
    transition:transform .45s cubic-bezier(.22,.9,.32,1);
  }
  .sliderTrack.showPage2{transform:translateX(-50%)}
  .page{width:50%;flex:0 0 50%;min-width:0}

  .dots{
    position:fixed;left:0;right:0;bottom:14px;display:flex;justify-content:center;gap:10px;
    z-index:20;pointer-events:none;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--field-border);transition:background .3s ease,transform .3s ease}
  .dot.active{background:var(--accent-2);transform:scale(1.2)}

  #page1{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 20px 70px;gap:22px;
  }
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px}
  .logoCard{
    background:#fff;border-radius:16px;padding:16px 22px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
  }
  .logoMark{
    width:min(360px,85vw);height:auto;display:block;
  }
  .brand h1{font-size:36px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-2)}

  .formCard{width:100%;max-width:460px;display:flex;flex-direction:column;gap:18px}
  .formCard .formTitle{
    font-size:15px;text-transform:uppercase;letter-spacing:.08em;font-weight:800;
    color:var(--text-soft);margin-bottom:2px;text-align:center;
  }
  .field{display:flex;flex-direction:column;gap:8px}
  .field span{font-size:14px;color:var(--text-soft);font-weight:600;text-align:center;text-transform:uppercase;letter-spacing:.04em}
  .field input{
    width:100%;padding:18px 20px;font-size:18px;border-radius:16px;
    background:var(--field);border:1px solid var(--field-border);color:var(--text);
  }
  #techName,#vehicleReg{text-align:center}
  .field input::placeholder{color:#5b6a80}
  .field input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .field.hasError input{border-color:var(--danger)}

  .vanCodeGroup{display:flex;width:100%;border-radius:16px;overflow:hidden;border:1px solid var(--field-border)}
  .vanCodePrefix{
    width:50%;padding:18px 20px;font-size:18px;font-weight:700;font-family:var(--mono);
    background:var(--panel-2);color:var(--text-soft);display:flex;align-items:center;justify-content:center;
    border-right:1px solid var(--field-border);
  }
  .vanCodeGroup input{
    width:50%;padding:18px 20px;font-size:18px;font-family:var(--mono);letter-spacing:.08em;text-align:center;
    background:var(--field);border:0;color:var(--text);border-radius:0;
  }
  .vanCodeGroup input:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .field.hasError .vanCodeGroup{border-color:var(--danger)}
  .fieldError{font-size:14px;color:var(--danger)}
  #confirmBtn{padding:18px 20px;font-size:16px;margin-top:6px}

  main{max-width:860px;margin:0 auto;padding:16px}

  .topbar{
    max-width:860px;margin:0 auto;padding:18px 20px 0;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .topbarTitle{font-size:18px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
  .topbarSub{font-size:12px;color:var(--text-soft);margin-top:2px}
  .linkBtn{
    appearance:none;border:0;background:none;color:var(--accent);font-size:13px;
    font-weight:700;cursor:pointer;text-decoration:underline;
  }

  .panel{background:var(--panel);border:1px solid var(--field-border);border-radius:16px;padding:16px;margin-bottom:16px}
  .panel h2{
    font-size:13px;text-transform:uppercase;letter-spacing:.06em;font-weight:800;
    color:var(--text-soft);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--field-border);
  }
  h2.subhead{margin-top:22px}

  .readerWrap{position:relative;width:100%;max-width:480px;margin:0 auto}
  #reader{width:100%;border-radius:14px;overflow:hidden;background:#000}
  #reader video{border-radius:14px}
  .scanOverlay{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:rgba(52,211,153,.94);border-radius:14px;color:#06281c;
    opacity:0;pointer-events:none;transition:opacity .2s ease;
  }
  .scanOverlay.show{opacity:1}
  .scanOverlayCheck{font-size:48px;font-weight:800;line-height:1}
  .scanOverlayText{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center;padding:0 16px}

  .btn{
    appearance:none;border:0;border-radius:14px;padding:13px 18px;
    font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;
    background:var(--field);color:var(--text);border:1px solid var(--field-border);
  }
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:0}
  .btn.ghost{background:transparent;color:var(--text-soft);border:1px solid var(--field-border)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn.full{width:100%}
  .btn:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}

  .status{
    text-align:center;margin-top:12px;font-size:14px;color:var(--text-soft);
    min-height:22px;
  }
  .status.hit{color:var(--ok);font-weight:600}
  .status.err{color:var(--danger)}

  .manual{display:flex;gap:8px;flex-wrap:wrap}
  .manual input{
    flex:1;min-width:200px;padding:13px 14px;font-size:16px;
    font-family:var(--mono);letter-spacing:.06em;
    border:1px solid var(--field-border);border-radius:14px;background:var(--field);color:var(--text);
  }
  .manual input::placeholder{color:#5b6a80}
  .manual input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}

  .tableScroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px;border:1px solid var(--field-border)}
  .tableScroll table{min-width:520px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:800;
    color:var(--text-soft);background:var(--panel-2);padding:10px 12px;border-bottom:1px solid var(--field-border);
  }
  td{padding:10px 12px;border-bottom:1px solid var(--field-border);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  td.ean{font-family:var(--mono);font-size:14px;letter-spacing:.04em}
  td.product{font-size:13px}
  td.product.unknown{color:var(--text-soft);font-style:italic}
  .qty{display:inline-flex;align-items:center;gap:8px}
  .qty button{
    width:28px;height:28px;border-radius:8px;border:1px solid var(--field-border);
    background:var(--field);font-size:15px;font-weight:700;cursor:pointer;color:var(--text);
  }
  .qty button:focus-visible{outline:2px solid var(--accent)}
  .qty span{min-width:24px;text-align:center;font-weight:700;font-family:var(--mono)}
  .rm{background:none;border:0;color:var(--danger);cursor:pointer;font-size:13px;text-decoration:underline}
  .time{color:var(--text-soft);font-size:12px;white-space:nowrap}

  .empty{
    text-align:center;color:var(--text-soft);padding:26px 10px;font-size:14px;
    border:1px dashed var(--field-border);border-radius:14px;
  }
  .summary{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:12px;flex-wrap:wrap;gap:10px;
  }
  .summary .totals{font-size:13px;color:var(--text-soft)}
  .summary .totals b{color:var(--text);font-family:var(--mono)}

  @media (prefers-reduced-motion:no-preference){
    @keyframes flash{0%{background:#28405f}100%{background:transparent}}
    tr.new td{animation:flash 1.2s ease-out}
  }
</style>
</head>
<body>

<div class="sliderViewport">
<div class="sliderTrack" id="sliderTrack">

<div id="page1" class="page">
  <div class="brand">
    <div class="logoCard">
      <img class="logoMark" src="KwikFit.svg.png" alt="Kwik Fit">
    </div>
    <h1>Stock Take</h1>
  </div>

  <div class="formCard">
    <label class="field" id="techNameField">
      <span>Technician Name</span>
      <input id="techName" type="text" autocomplete="off" list="techNameList">
      <datalist id="techNameList"></datalist>
      <div class="fieldError" id="techNameError" hidden></div>
    </label>
    <label class="field" id="vanCodeField">
      <span>Van Code</span>
      <div class="vanCodeGroup">
        <div class="vanCodePrefix">108</div>
        <input id="vanCode" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" autocomplete="off" placeholder="000">
      </div>
      <div class="fieldError" id="vanCodeError" hidden></div>
    </label>
    <label class="field" id="vehicleRegField">
      <span>Vehicle Registration</span>
      <input id="vehicleReg" type="text" autocomplete="off">
      <div class="fieldError" id="vehicleRegError" hidden></div>
    </label>
    <button class="btn primary full" id="confirmBtn">Confirm</button>
  </div>
</div>

<div id="page2" class="page">
  <div class="topbar">
    <div>
      <div class="topbarTitle">Stock Take</div>
      <div class="topbarSub" id="jobSummary"></div>
    </div>
    <button class="linkBtn" id="editDetailsBtn">Edit details</button>
  </div>

  <main>
    <section class="panel">
      <h2>Camera scan</h2>
      <div class="readerWrap">
        <div id="reader" aria-label="Camera preview"></div>
        <div class="scanOverlay" id="scanOverlay" aria-hidden="true">
          <div class="scanOverlayCheck">&#10003;</div>
          <div class="scanOverlayText" id="scanOverlayText"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="startBtn">Start camera</button>
        <button class="btn ghost" id="stopBtn" disabled>Stop camera</button>
      </div>
      <div class="status" id="status" role="status">Camera is off. Start it to begin scanning.</div>
    </section>

    <section class="panel">
      <h2>Manual entry</h2>
      <div class="manual">
        <input id="manualEan" autocomplete="off"
               placeholder="Type or paste an EAN, or free-type if there's no label"
               aria-label="EAN code or free-type manual entry">
        <button class="btn primary" id="addManual">Add</button>
      </div>
    </section>

    <section class="panel">
      <h2>Scanned codes</h2>
      <div id="listWrap">
        <div class="empty" id="emptyMsg">Nothing scanned yet. Each repeat scan of the same EAN increases its quantity.</div>
        <div class="tableScroll">
          <table id="scanTable" hidden>
            <thead>
              <tr><th>EAN code</th><th>Product</th><th>Qty</th><th>Last scanned</th><th></th></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <h2 class="subhead">Manually typed</h2>
      <div id="manualListWrap">
        <div class="empty" id="manualEmptyMsg">No manually typed entries.</div>
        <div class="tableScroll">
          <table id="manualTable" hidden>
            <thead>
              <tr><th>Entry</th><th>Qty</th><th>Last entered</th><th></th></tr>
            </thead>
            <tbody id="manualTbody"></tbody>
          </table>
        </div>
      </div>

      <div class="summary">
        <div class="totals" id="totals"></div>
        <div class="btn-row" style="margin:0">
          <button class="btn danger" id="clearBtn" hidden>Clear all</button>
          <button class="btn primary" id="exportBtn" hidden>Confirm & Download</button>
        </div>
      </div>
    </section>
  </main>
</div>

</div>
</div>

<div class="dots" id="dots" aria-hidden="true">
  <span class="dot active" data-page="0"></span>
  <span class="dot" data-page="1"></span>
</div>

<script>
(function(){
  "use strict";
  var scans = {};            // ean -> {qty, first, last, product}
  var order = [];            // insertion order of EANs
  var manualScans = {};      // free-typed text -> {qty, first, last}
  var manualOrder = [];      // insertion order of manual entries
  var scanner = null;
  var running = false;
  var lastCode = null, lastAt = 0;
  var scanPauseUntil = 0;
  var checkDateTimeValue = "";

  var sliderTrack = document.getElementById("sliderTrack");
  var dots = document.querySelectorAll("#dots .dot");

  function goToPage(index){
    sliderTrack.classList.toggle("showPage2", index === 1);
    dots.forEach(function(d, i){ d.classList.toggle("active", i === index); });
    window.scrollTo(0, 0);
  }
  var techNameEl = document.getElementById("techName");
  var vanCodeEl = document.getElementById("vanCode");
  var vehicleRegEl = document.getElementById("vehicleReg");
  var techNameField = document.getElementById("techNameField");
  var vanCodeField = document.getElementById("vanCodeField");
  var vehicleRegField = document.getElementById("vehicleRegField");
  var techNameError = document.getElementById("techNameError");
  var vanCodeError = document.getElementById("vanCodeError");
  var vehicleRegError = document.getElementById("vehicleRegError");
  var confirmBtn = document.getElementById("confirmBtn");
  var editDetailsBtn = document.getElementById("editDetailsBtn");
  var jobSummary = document.getElementById("jobSummary");

  var scanOverlay = document.getElementById("scanOverlay");
  var scanOverlayText = document.getElementById("scanOverlayText");
  var scanOverlayTimer = null;

  function showScanOverlay(label){
    scanOverlayText.textContent = label;
    scanOverlay.classList.add("show");
    clearTimeout(scanOverlayTimer);
    scanOverlayTimer = setTimeout(function(){ scanOverlay.classList.remove("show"); }, 1000);
  }

  var statusEl = document.getElementById("status");
  var tbody = document.getElementById("tbody");
  var table = document.getElementById("scanTable");
  var emptyMsg = document.getElementById("emptyMsg");
  var manualTbody = document.getElementById("manualTbody");
  var manualTable = document.getElementById("manualTable");
  var manualEmptyMsg = document.getElementById("manualEmptyMsg");
  var exportBtn = document.getElementById("exportBtn");
  var clearBtn = document.getElementById("clearBtn");
  var totals = document.getElementById("totals");

  function setStatus(msg, cls){
    statusEl.textContent = msg;
    statusEl.className = "status" + (cls ? " " + cls : "");
  }

  function validEan(code){
    if(!/^\d{8}$|^\d{13}$/.test(code)) return false;
    var digits = code.split("").map(Number);
    var check = digits.pop(), sum = 0;
    digits.reverse().forEach(function(d,i){ sum += d * (i % 2 === 0 ? 3 : 1); });
    return (10 - (sum % 10)) % 10 === check;
  }

  var audioCtx = null;
  function getAudioContext(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === "suspended"){ audioCtx.resume(); }
    return audioCtx;
  }

  function beep(){
    try{
      var ctx = getAudioContext();
      if(ctx){
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 1200; g.gain.value = 0.12;
        o.start(); o.stop(ctx.currentTime + 0.12);
      }
    }catch(e){}
    if(navigator.vibrate) navigator.vibrate(60);
  }

  function fmt(d){
    return d.toLocaleDateString("en-GB") + " " + d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  }

  function lookupProduct(code){
    var lookup = (typeof EAN_LOOKUP !== "undefined") ? EAN_LOOKUP : null;
    return (lookup && lookup[code]) ? lookup[code] : null;
  }

  // ---- van code <-> vehicle reg lookup ----
  function normalizeReg(v){
    return String(v || "").replace(/\s+/g,"").toUpperCase();
  }
  function lookupRegForVan(digits){
    var map = (typeof VAN_LOOKUP !== "undefined") ? VAN_LOOKUP : null;
    return (map && map[digits]) ? map[digits] : null;
  }
  function lookupVanForReg(reg){
    var map = (typeof VAN_LOOKUP !== "undefined") ? VAN_LOOKUP : null;
    if(!map) return null;
    var norm = normalizeReg(reg);
    if(!norm) return null;
    for(var code in map){
      if(map[code] === norm) return code;
    }
    return null;
  }

  // ---- technician name autocomplete ----
  (function populateTechNames(){
    var names = (typeof TECH_NAMES !== "undefined") ? TECH_NAMES : [];
    var list = document.getElementById("techNameList");
    names.forEach(function(n){
      var opt = document.createElement("option");
      opt.value = n;
      list.appendChild(opt);
    });
  })();

  // ---- page 1: technician info ----
  function showFieldError(fieldEl, errorEl, msg){
    fieldEl.classList.add("hasError");
    errorEl.textContent = msg;
    errorEl.hidden = false;
  }
  function clearFieldError(fieldEl, errorEl){
    fieldEl.classList.remove("hasError");
    errorEl.hidden = true;
  }
  [[techNameEl, techNameField, techNameError], [vanCodeEl, vanCodeField, vanCodeError], [vehicleRegEl, vehicleRegField, vehicleRegError]].forEach(function(t){
    t[0].addEventListener("input", function(){ clearFieldError(t[1], t[2]); });
  });

  var lastAutoReg = null;  // reg value most recently auto-filled from a van code lookup
  var lastAutoVan = null;  // van code most recently auto-filled from a vehicle reg lookup

  vanCodeEl.addEventListener("input", function(){
    lastAutoVan = null;  // user is now editing the van code directly
    vanCodeEl.value = vanCodeEl.value.replace(/\D/g,"").slice(0,3);
    if(vanCodeEl.value.length === 3){
      var reg = lookupRegForVan(vanCodeEl.value);
      if(reg){
        vehicleRegEl.value = reg;
        lastAutoReg = reg;
        clearFieldError(vehicleRegField, vehicleRegError);
      }else{
        lastAutoReg = null;
      }
    }else{
      if(lastAutoReg && vehicleRegEl.value === lastAutoReg){
        vehicleRegEl.value = "";
      }
      lastAutoReg = null;
    }
  });

  vehicleRegEl.addEventListener("input", function(){
    lastAutoReg = null;  // user is now editing the reg directly

    // strip spaces and uppercase live, so "LK74 ZHU" reformats to "LK74ZHU" as you type
    var caretPos = vehicleRegEl.selectionStart;
    var removedBefore = (vehicleRegEl.value.slice(0, caretPos).match(/\s/g) || []).length;
    vehicleRegEl.value = normalizeReg(vehicleRegEl.value);
    var newCaret = caretPos - removedBefore;
    vehicleRegEl.setSelectionRange(newCaret, newCaret);

    if(vanCodeEl.value.trim() && vanCodeEl.value !== lastAutoVan) return;  // van code was typed manually — don't override it
    var code = lookupVanForReg(vehicleRegEl.value);
    if(code){
      vanCodeEl.value = code;
      lastAutoVan = code;
      clearFieldError(vanCodeField, vanCodeError);
    }else{
      if(lastAutoVan && vanCodeEl.value === lastAutoVan){
        vanCodeEl.value = "";
      }
      lastAutoVan = null;
    }
  });

  confirmBtn.onclick = function(){
    var tech = techNameEl.value.trim();
    var vanDigits = vanCodeEl.value.trim();
    var van = "108" + vanDigits;
    var reg = vehicleRegEl.value.trim();
    var valid = true;

    if(!tech){ showFieldError(techNameField, techNameError, "Technician name is required."); valid = false; }
    else{ clearFieldError(techNameField, techNameError); }

    if(!vanDigits){ showFieldError(vanCodeField, vanCodeError, "Van code is required."); valid = false; }
    else if(!/^\d{3}$/.test(vanDigits)){ showFieldError(vanCodeField, vanCodeError, "Van code must be 3 digits."); valid = false; }
    else{ clearFieldError(vanCodeField, vanCodeError); }

    if(!reg){ showFieldError(vehicleRegField, vehicleRegError, "Vehicle registration is required."); valid = false; }
    else{ clearFieldError(vehicleRegField, vehicleRegError); }

    if(!valid) return;

    checkDateTimeValue = fmt(new Date());
    jobSummary.textContent = tech + " · " + van + " · " + reg + " · " + checkDateTimeValue;
    goToPage(1);
  };

  editDetailsBtn.onclick = function(){
    stopCamera(true);
    goToPage(0);
  };

  function record(code, source){
    var now = new Date();
    var product = lookupProduct(code);
    if(scans[code]){
      scans[code].qty += 1;
      scans[code].last = now;
    }else{
      scans[code] = {qty:1, first:now, last:now, product:product};
      order.push(code);
    }
    beep();
    setStatus("Captured " + code + (product ? " — " + product : "") + " (qty " + scans[code].qty + ")" + (source==="manual"?" — added manually":""), "hit");
    render(code);
  }

  function recordManual(text){
    var now = new Date();
    if(manualScans[text]){
      manualScans[text].qty += 1;
      manualScans[text].last = now;
    }else{
      manualScans[text] = {qty:1, first:now, last:now};
      manualOrder.push(text);
    }
    beep();
    setStatus("Added manual entry \"" + text + "\" (qty " + manualScans[text].qty + ")", "hit");
    renderManual(text);
  }

  function renderSummary(){
    var totalEntries = order.length + manualOrder.length;
    if(totalEntries === 0){
      exportBtn.hidden = true; clearBtn.hidden = true;
      totals.textContent = "";
      return;
    }
    exportBtn.hidden = false; clearBtn.hidden = false;
    var units = order.reduce(function(a,e){return a + scans[e].qty;}, 0);
    var manualUnits = manualOrder.reduce(function(a,e){return a + manualScans[e].qty;}, 0);
    totals.innerHTML = "<b>" + order.length + "</b> unique EANs &middot; <b>" + units + "</b> units" +
      (manualOrder.length ? " &middot; <b>" + manualOrder.length + "</b> manual entries &middot; <b>" + manualUnits + "</b> manual units" : "");
  }

  function render(newCode){
    if(order.length === 0){
      table.hidden = true; emptyMsg.hidden = false;
      renderSummary();
      return;
    }
    table.hidden = false; emptyMsg.hidden = true;

    tbody.innerHTML = "";
    order.forEach(function(ean){
      var s = scans[ean];
      var tr = document.createElement("tr");
      if(ean === newCode) tr.className = "new";

      var tdE = document.createElement("td");
      tdE.className = "ean"; tdE.textContent = ean;

      var tdP = document.createElement("td");
      tdP.className = "product" + (s.product ? "" : " unknown");
      tdP.textContent = s.product || "Unknown — not in list";

      var tdQ = document.createElement("td");
      var wrap = document.createElement("div"); wrap.className = "qty";
      var minus = document.createElement("button"); minus.textContent = "−";
      minus.setAttribute("aria-label","Decrease quantity for " + ean);
      minus.onclick = function(){
        s.qty -= 1;
        if(s.qty <= 0){ delete scans[ean]; order = order.filter(function(x){return x!==ean;}); }
        render();
      };
      var qty = document.createElement("span"); qty.textContent = s.qty;
      var plus = document.createElement("button"); plus.textContent = "+";
      plus.setAttribute("aria-label","Increase quantity for " + ean);
      plus.onclick = function(){ s.qty += 1; s.last = new Date(); render(); };
      wrap.appendChild(minus); wrap.appendChild(qty); wrap.appendChild(plus);
      tdQ.appendChild(wrap);

      var tdT = document.createElement("td");
      tdT.className = "time"; tdT.textContent = fmt(s.last);

      var tdR = document.createElement("td");
      var rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "Remove";
      rm.onclick = function(){
        delete scans[ean]; order = order.filter(function(x){return x!==ean;}); render();
      };
      tdR.appendChild(rm);

      tr.appendChild(tdE); tr.appendChild(tdP); tr.appendChild(tdQ); tr.appendChild(tdT); tr.appendChild(tdR);
      tbody.appendChild(tr);
    });

    renderSummary();
  }

  function renderManual(newText){
    if(manualOrder.length === 0){
      manualTable.hidden = true; manualEmptyMsg.hidden = false;
      renderSummary();
      return;
    }
    manualTable.hidden = false; manualEmptyMsg.hidden = true;

    manualTbody.innerHTML = "";
    manualOrder.forEach(function(text){
      var s = manualScans[text];
      var tr = document.createElement("tr");
      if(text === newText) tr.className = "new";

      var tdText = document.createElement("td");
      tdText.textContent = text;

      var tdQ = document.createElement("td");
      var wrap = document.createElement("div"); wrap.className = "qty";
      var minus = document.createElement("button"); minus.textContent = "−";
      minus.setAttribute("aria-label","Decrease quantity for " + text);
      minus.onclick = function(){
        s.qty -= 1;
        if(s.qty <= 0){ delete manualScans[text]; manualOrder = manualOrder.filter(function(x){return x!==text;}); }
        renderManual();
      };
      var qty = document.createElement("span"); qty.textContent = s.qty;
      var plus = document.createElement("button"); plus.textContent = "+";
      plus.setAttribute("aria-label","Increase quantity for " + text);
      plus.onclick = function(){ s.qty += 1; s.last = new Date(); renderManual(); };
      wrap.appendChild(minus); wrap.appendChild(qty); wrap.appendChild(plus);
      tdQ.appendChild(wrap);

      var tdT = document.createElement("td");
      tdT.className = "time"; tdT.textContent = fmt(s.last);

      var tdR = document.createElement("td");
      var rm = document.createElement("button"); rm.className = "rm"; rm.textContent = "Remove";
      rm.onclick = function(){
        delete manualScans[text]; manualOrder = manualOrder.filter(function(x){return x!==text;}); renderManual();
      };
      tdR.appendChild(rm);

      tr.appendChild(tdText); tr.appendChild(tdQ); tr.appendChild(tdT); tr.appendChild(tdR);
      manualTbody.appendChild(tr);
    });

    renderSummary();
  }

  // ---- camera ----
  document.getElementById("startBtn").onclick = function(){
    if(running) return;
    if(typeof Html5Qrcode === "undefined"){
      setStatus("Camera scanner failed to load. Check your connection and reload the page, or use manual entry below.", "err");
      return;
    }
    getAudioContext();
    try{
      scanner = new Html5Qrcode("reader", {
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A
        ]
      });
    }catch(err){
      setStatus("Could not initialise the camera scanner: " + err + ". Use manual entry below.", "err");
      return;
    }
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 280, height: 140 } },
      function(text){
        var now = Date.now();
        if(now < scanPauseUntil) return;  // brief pause after a successful capture
        if(text === lastCode && now - lastAt < 2500) return;  // debounce duplicate frames
        lastCode = text; lastAt = now;
        if(!validEan(text)){ setStatus("Read " + text + " but checksum failed — try again.", "err"); return; }
        record(text, "camera");
        showScanOverlay(scans[text].product || text);
        scanPauseUntil = now + 2000;
      },
      function(){ /* per-frame miss, ignore */ }
    ).then(function(){
      running = true;
      document.getElementById("startBtn").disabled = true;
      document.getElementById("stopBtn").disabled = false;
      setStatus("Camera running. Hold a barcode inside the box.");
    }).catch(function(err){
      setStatus("Could not start camera: " + err + ". Check permissions, or use manual entry.", "err");
    });
  };

  function stopCamera(silent){
    if(!scanner || !running) return;
    scanner.stop().then(function(){
      scanner.clear(); running = false;
      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
      if(!silent) setStatus("Camera is off.");
    });
  }
  document.getElementById("stopBtn").onclick = function(){ stopCamera(false); };

  // ---- manual ----
  function addManual(){
    var input = document.getElementById("manualEan");
    var raw = input.value.trim();
    if(!raw) return;
    var code = raw.replace(/\s+/g,"");
    if(validEan(code)){
      record(code, "manual");
    }else{
      recordManual(raw);
    }
    input.value = ""; input.focus();
  }
  document.getElementById("addManual").onclick = addManual;
  document.getElementById("manualEan").addEventListener("keydown", function(e){
    if(e.key === "Enter") addManual();
  });

  // ---- export ----
  function csvField(v){
    v = String(v);
    if(/[",\r\n]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
    return v;
  }

  function sanitizeFilenamePart(v){
    return String(v).trim().replace(/[\\/:*?"<>|]/g,"-").replace(/\s+/g,"_");
  }

  exportBtn.onclick = function(){
    var tech = techNameEl.value.trim();
    var van = "108" + vanCodeEl.value.trim();
    var reg = vehicleRegEl.value.trim();
    var checkDt = checkDateTimeValue;
    var rows = [["Technician_Name","Van_Code","Vehicle_Reg","Check_DateTime","Entry_Type","Code","Product_Name","Quantity","First_Scanned","Last_Scanned"]];
    order.forEach(function(ean){
      var s = scans[ean];
      rows.push([tech, van, reg, checkDt, "Scanned Code", ean, s.product || "", s.qty, s.first.toISOString(), s.last.toISOString()]);
    });
    manualOrder.forEach(function(text){
      var s = manualScans[text];
      rows.push([tech, van, reg, checkDt, "Manually Typed", text, "", s.qty, s.first.toISOString(), s.last.toISOString()]);
    });
    var csv = rows.map(function(r){ return r.map(csvField).join(","); }).join("\r\n");
    var blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    var fileName = [tech, van, reg, checkDt].map(sanitizeFilenamePart).join("_") + ".csv";
    a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    setStatus("CSV downloaded — attach it and email to mobilestock@kwik-fit.com.", "hit");
  };

  clearBtn.onclick = function(){
    if(confirm("Clear all scanned and manually typed entries?")){
      scans = {}; order = []; manualScans = {}; manualOrder = [];
      render(); renderManual(); setStatus("List cleared.");
    }
  };
})();
</script>
</body>
